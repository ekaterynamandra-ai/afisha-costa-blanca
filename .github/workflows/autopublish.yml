name: Auto-publish Telegram posts

on:
  schedule:
    # Spanish summer time (CEST = UTC+2). Покрываем все слоты постов из content/schedule/:
    # 06 UTC=08, 07=09, 08=10, 11=13, 12=14, 16=18 CEST
    - cron: '0 6,7,8,11,12,16 * * *'
  # cron-job.org также может дёргать workflow_dispatch как внешний failover.
  # Оба триггера безопасны — autopublish.py идемпотентен (status-guard в JSON).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv tzdata

      - name: Run autopublish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: python scripts/autopublish.py

      - name: Commit updated schedule files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add content/schedule/
          git diff --staged --quiet || git commit -m "Auto-publish: update post statuses"
          git push
