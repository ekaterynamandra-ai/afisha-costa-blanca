name: Auto-publish Telegram posts

on:
  schedule:
    # Spanish summer time (CEST = UTC+2):
    # 06:00 UTC = 08:00 CEST (rynok утром, посты 08:00)
    # 07:00 UTC = 09:00 CEST (посты 09:00)
    # 08:00 UTC = 10:00 CEST (посты 10:00)
    # 11:00 UTC = 13:00 CEST (посты 13:00)
    # 12:00 UTC = 14:00 CEST (посты 14:00)
    # 16:00 UTC = 18:00 CEST (посты 18:00)
    - cron: '0 6,7,8,11,12,16 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv tzdata

      - name: Run autopublish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: python scripts/autopublish.py

      - name: Commit updated schedule files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add content/schedule/
          git diff --staged --quiet || git commit -m "Auto-publish: update post statuses"
          git push
