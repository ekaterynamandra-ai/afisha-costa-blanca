name: Auto-publish Telegram posts

on:
  # Единственный триггер — cron-job.org (ежечасно 08–20 CEST) через GitHub API workflow_dispatch.
  # GitHub native schedule удалён: ненадёжен (задержки 30–60 мин), создавал расхождение с cron-job.org.
  # См. docs/publishing-logic.md.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv tzdata

      - name: Run autopublish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: python scripts/autopublish.py

      - name: Commit updated schedule files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add content/schedule/
          git diff --staged --quiet || git commit -m "Auto-publish: update post statuses"
          git push
