name: Auto-publish Telegram posts

on:
  schedule:
    # Spanish summer time (CEST = UTC+2):
    # 06:00 UTC = 08:00 CEST (rynok)
    # 08:00 UTC = 10:00 CEST (utro)
    # 12:00 UTC = 14:00 CEST (den)
    # 16:00 UTC = 18:00 CEST (vecher)
    - cron: '0 6,8,12,16 * * *'
    # TEST: 14:20 UTC = 16:20 CEST (one-off, remove after test)
    - cron: '20 14 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv tzdata

      - name: Run autopublish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: python scripts/autopublish.py

      - name: Commit updated schedule files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add content/schedule/*.json
          git diff --staged --quiet || git commit -m "Auto-publish: update post statuses"
          git push
