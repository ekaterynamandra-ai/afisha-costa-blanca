name: Auto-publish Telegram posts

on:
  schedule:
    # Run at 8:00, 10:00, 14:00, 18:00 UTC = 10:00, 12:00, 16:00, 20:00 Spanish time (CEST)
    # Covers typical post times: 10:00, 14:00, 18:00 Spanish
    - cron: '0 8,10,14,18 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv tzdata

      - name: Run autopublish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: python scripts/autopublish.py

      - name: Commit updated schedule files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add content/schedule/*.json
          git diff --staged --quiet || git commit -m "Auto-publish: update post statuses"
          git push
